name: Build Windows release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
      - name: Install Inno Setup
        run: winget install --id JRSoftware.InnoSetup --accept-package-agreements --accept-source-agreements --disable-interactivity
      - name: Verify repository privacy
        run: python scripts/scan_private_data.py
      - name: Build and smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build.ps1
      - name: Verify release assets
        run: |
          python scripts/scan_private_data.py --path release
          Get-ChildItem release -File | Where-Object { $_.Length -ge 2GB } | ForEach-Object { throw "Asset too large: $($_.Name)" }
      - uses: actions/upload-artifact@v4
        with:
          name: DifferentNetworkTranscribe-Windows
          path: release/
      - name: Publish GitHub Release for the tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}" release/*
          --title "Different Network Transcribe ${{ github.ref_name }}"
          --generate-notes
