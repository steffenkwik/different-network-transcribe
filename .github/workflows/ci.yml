name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  quality-gate:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt

      - name: Lint (ruff)
        run: python -m ruff check app worker tests scripts

      - name: Type check (mypy)
        run: python -m mypy app worker

      # The UI tests need a Qt platform. offscreen keeps them headless on CI.
      - name: Tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -m "not realdata and not realmodel" --cov=app --cov=worker

      # Blueprint 17.1 / addendum 21: no private data may ever reach this repo.
      # This runs on every PR, not only at release, because git history is permanent.
      - name: Private-data scan
        run: python scripts/scan_private_data.py

  build-smoke:
    runs-on: windows-latest
    needs: quality-gate
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt

      # Proves the entry point starts and the main window actually renders.
      - name: App start smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m app.main --data-dir "${{ runner.temp }}\dnt-ci" --self-test
